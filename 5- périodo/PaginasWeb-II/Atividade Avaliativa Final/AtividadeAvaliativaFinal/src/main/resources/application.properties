spring.application.name=AtividadeAvaliativaFinal

# ==========================================
# CONFIGURA«’ES DO BANCO DE DADOS (MySQL)
# ==========================================
# O par‚metro "?createDatabaseIfNotExist=true" cria o banco automaticamente se ele n„o existir
spring.datasource.url=jdbc:mysql://localhost:3306/AgendaDeTarefas?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Driver atualizado do MySQL (a vers„o sem 'cj' est· obsoleta)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# CONFIGURA«’ES DO HIBERNATE / JPA
# ==========================================
# Mostra os comandos SQL no terminal (˙til para debugar)
spring.jpa.show-sql=true

# Cria e atualiza as tabelas automaticamente no banco de dados
spring.jpa.hibernate.ddl-auto=update

# ==========================================
# TRATAMENTO DE ERROS NA API
# ==========================================
# Garante que as mensagens das exceÁıes apareÁam no JSON de resposta
server.error.include-message=always
server.error.include-binding-errors=always

logging.level.web=DEBUG